<div class="max-w-sm mx-auto mt-24 bg-gray-900 rounded-xl shadow-lg p-8 text-gray-100">
  <h2 class="text-2xl font-bold text-purple-300 mb-6 text-center">Login</h2>

  <div class="mb-4">
    <label class="block mb-1 text-gray-300">Username</label>
    <input
      pInputText
      type="text"
      [value]="username()"
      (input)="username.set($any($event.target).value)"
      (blur)="usernameTouched.set(true)"
      class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500"
    />
    @if (usernameTouched() && usernameError()) {
      <div class="text-red-400 text-xs mt-1">{{ usernameError() }}</div>
    }
  </div>

  <div class="mb-6">
    <label class="block mb-1 text-gray-300">Password</label>
    <input
      pInputText
      type="password"
      [value]="password()"
      (input)="password.set($any($event.target).value)"
      (blur)="passwordTouched.set(true)"
      class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500"
    />
    @if (passwordTouched() && passwordError()) {
      <div class="text-red-400 text-xs mt-1">{{ passwordError() }}</div>
    }
  </div>

  <button
    type="button"
    (click)="onSubmit()"
    [class.opacity-50]="!isValid()"
    class="w-full bg-purple-700 hover:bg-purple-800 text-white px-4 py-2 rounded-lg shadow transition"
  >
    Login
  </button>
</div>
